server:
  port: 8001

spring:
  application:
    name: cloud-auth
  datasource:
    url: jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: '123456'
    database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.example.auth: DEBUG
