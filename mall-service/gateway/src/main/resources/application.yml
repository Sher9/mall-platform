server:
  port: 8000

spring:
  application:
    name: cloud-gateway
  web:
    resources:
      add-mappings: false
  redis:
    host: localhost
    port: 6379
    password: '123456'
    database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: cloud-auth
          uri: lb://cloud-auth
          predicates:
            - Path=/api/admin/**,/api/customer/**
          filters:
            - StripPrefix=1
        - id: cloud-system
          uri: lb://cloud-system
          predicates:
            - Path=/api/user/**,/api/system/**,/api/role/**,/api/menu/**,/api/permission/**,/api/product/**,/api/customers/**,/api/address/**,/api/home/**,/api/banner/**,/api/categories/**
          filters:
            - StripPrefix=1
        - id: cloud-order
          uri: lb://cloud-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        - id: cloud-stock
          uri: lb://cloud-stock
          predicates:
            - Path=/api/stock/**
          filters:
            - StripPrefix=1
        - id: cloud-upload
          uri: lb://cloud-upload
          predicates:
            - Path=/api/upload/**
          filters:
            - StripPrefix=1
        - id: cloud-cart
          uri: lb://cloud-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
        - id: cloud-pay
          uri: lb://cloud-pay
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=1
        # 文件访问路由
        - id: files
          uri: http://localhost:8003
          predicates:
            - Path=/files/**
          filters:
            - StripPrefix=0
      httpclient:
        connect-timeout: 10000
        response-timeout: 30000
      httpserver:
        compression:
          enabled: true
          mime-types: text/html,text/xml,text/plain,text/css,application/json,application/javascript
          min-response-size: 2048

sentinel:
  transport:
    dashboard: 127.0.0.1:8719
  datasource:
    ds:
      nacos:
        server-addr: 127.0.0.1:8848
        data-id: ${spring.application.name}-sentinel
        group-id: DEFAULT_GROUP
        rule-type: gw_flow
  web-context-unify: false

logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
