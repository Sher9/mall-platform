server:
  port: 8005

spring:
  application:
    name: cloud-pay
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall_pay?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.pay.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 微信支付配置（实际对接需要填写）
wechat:
  pay:
    app-id: your_app_id
    mch-id: your_mch_id
    api-v3-key: your_api_v3_key
    private-key-path: classpath:wechat/apiclient_key.pem
    certificate-path: classpath:wechat/apiclient_cert.pem
    notify-url: http://your-domain/api/pay/wechat/callback

# 支付宝配置（实际对接需要填写）
alipay:
  app-id: your_app_id
  private-key: your_private_key
  public-key: your_public_key
  notify-url: http://your-domain/api/pay/alipay/callback
  return-url: http://your-domain/pay/return

logging:
  level:
    com.example.pay: debug
