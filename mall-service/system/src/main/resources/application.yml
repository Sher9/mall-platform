server:
  port: 8004

spring:
  application:
    name: cloud-system
  datasource:
    url: jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
    sentinel:
      transport:
        dashboard: 127.0.0.1:8719

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

rocketmq:
  enabled: false
  name-server: 127.0.0.1:9876
  producer:
    group: system-producer-group

logging:
  level:
    com.example.system: DEBUG
